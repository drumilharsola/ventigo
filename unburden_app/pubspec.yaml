name: unburden_app
description: UNBurDEN — Anonymous peer support in 15-minute sessions.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.7.0
  web_socket_channel: ^3.0.2
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brands/unburden/
    - assets/brands/clientdemo/
