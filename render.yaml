# Render Blueprint — deploys the FastAPI backend as a free web service.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: varta-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    region: oregon
    healthCheckPath: /health

    envVars:
      - key: APP_ENV
        value: production

      - key: JWT_EXPIRE_HOURS
        value: 168

      - key: SMTP_FROM
        value: "Flow <onboarding@resend.dev>"

      - key: APP_SECRET_KEY
        generateValue: true

      - key: REDIS_URL
        sync: false

      - key: RESEND_API_KEY
        sync: false

      - key: APP_BASE_URL
        sync: false

      - key: ALLOWED_ORIGINS
        sync: false
