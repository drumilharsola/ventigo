# Render Blueprint - deploys the FastAPI backend + Flutter web frontend.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: UNBurDEN-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    region: oregon
    healthCheckPath: /health

    envVars:
      # ── Static values set by this file ───────────────────────────────────
      - key: APP_ENV
        value: production

      - key: JWT_EXPIRE_HOURS
        value: 168          # 7 days - no refresh tokens yet

      - key: SMTP_FROM
        sync: false  # set to "BrandName <email>" after domain verified

      # ── Auto-generated secrets ────────────────────────────────────────────
      - key: APP_SECRET_KEY
        generateValue: true  # Render generates a secure random value

      # ── Set manually in Render dashboard (sync: false = not stored in git) ─
      - key: REDIS_URL
        sync: false          # Upstash Redis URL  (rediss://...)

      - key: RESEND_API_KEY
        sync: false          # From resend.com dashboard

      - key: APP_BASE_URL
        sync: false          

      - key: ALLOWED_ORIGINS
        sync: false          # Flutter web URL (comma-separated if multiple)

  # ── Flutter Web Frontend ──────────────────────────────────────────────────
  - type: web
    name: UNBurDEN-web
    runtime: docker
    rootDir: unburden_app
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon

    envVars:
      - key: API_BASE_URL
        sync: false          # Set to backend URL (e.g. https://unburden-backend.onrender.com)
