sonar.projectKey=drumilharsola_ventigo
sonar.organization=drumilharsola
sonar.projectName=Ventigo

sonar.sources=backend,ventigo_app/lib
sonar.tests=backend/tests,ventigo_app/test
sonar.test.exclusions=backend/tests/**,ventigo_app/test/**

# Python
sonar.python.coverage.reportPaths=backend/coverage.xml

# Dart / Flutter
sonar.coverageReportPaths=ventigo_app/coverage/lcov.info

# Exclusions — exclude test dirs from source indexing to avoid double-indexing
sonar.exclusions=**/build/**,**/.venv/**,**/node_modules/**,**/__pycache__/**,**/alembic/versions/**,backend/tests/**,ventigo_app/test/**
