name: CI / CD

on:
  push:
    branches: [main, dhrumil-dev]
  pull_request:
    branches: [main]

jobs:
  # ── 1. CVE & dependency security scan ───────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - filesystem CVE scan
        uses: aquasecurity/trivy-action@0.9.2
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          trivy-version: v0.56.1

      - name: pip-audit - Python dependency scan
        run: |
          pip install pip-audit --quiet
          pip-audit -r backend/requirements.txt --desc on

  # ── 2. Backend unit tests ────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt pytest --quiet

      - run: pytest tests/ -v --tb=short

  # ── 3. Flutter web build ────────────────────────────────────────────────────
  build-flutter-web:
    name: Flutter Web Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unburden_app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build web --release

  # ── 4. Deploy to Render (main or dhrumil-dev, all checks must pass) ─────
  deploy:
    name: Deploy → Render
    needs: [security, test-backend, build-flutter-web]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dhrumil-dev')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl --fail-with-body -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        # Set RENDER_DEPLOY_HOOK in GitHub repo Settings → Secrets → Actions
        # Get the hook URL from Render dashboard → your service → Settings → Deploy Hook
