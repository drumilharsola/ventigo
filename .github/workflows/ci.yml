name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. CVE & dependency security scan ───────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - filesystem CVE scan
        uses: aquasecurity/trivy-action@0.9.2
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      - name: pip-audit - Python dependency scan
        run: |
          pip install pip-audit --quiet
          pip-audit -r backend/requirements.txt --desc on

  # ── 2. Backend unit tests ────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt pytest --quiet

      - run: pytest tests/ -v --tb=short
