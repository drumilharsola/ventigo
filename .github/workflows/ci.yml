name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -- 1. CVE & dependency security scan ---------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - filesystem CVE scan
        uses: aquasecurity/trivy-action@0.9.2
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      - name: pip-audit - Python dependency scan
        run: |
          pip install pip-audit --quiet
          pip-audit -r backend/requirements.txt --desc on

  # -- 2. Backend unit tests + coverage -----------------------------------------
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt pytest pytest-cov --quiet

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml:coverage.xml

      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # -- 3. Flutter tests + coverage ----------------------------------------------
  test-flutter:
    name: Flutter Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ventigo_app
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: ventigo_app/coverage/lcov.info

  # -- 4. SonarCloud analysis --------------------------------------------------
  sonarcloud:
    name: SonarCloud
    needs: [test-backend, test-flutter]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/

      - uses: actions/download-artifact@v4
        with:
          name: flutter-coverage
          path: ventigo_app/coverage/

      - name: Convert LCOV to SonarCloud generic coverage XML
        run: |
          python3 -c "
          import re, sys
          lcov = open('ventigo_app/coverage/lcov.info').read()
          out = ['<coverage version=\"1\">']
          for block in lcov.strip().split('end_of_record'):
              block = block.strip()
              if not block: continue
              sf = re.search(r'SF:(.*)', block)
              if not sf: continue
              path = sf.group(1).strip().replace('\\\\', '/')
              # make path relative to workspace root
              if '/lib/' in path:
                  path = 'ventigo_app/lib/' + path.split('/lib/', 1)[1]
              elif path.startswith('lib/'):
                  path = 'ventigo_app/' + path
              out.append(f'  <file path=\"{path}\">')
              for m in re.finditer(r'DA:(\d+),(\d+)', block):
                  line, hits = m.group(1), m.group(2)
                  covered = 'true' if int(hits) > 0 else 'false'
                  out.append(f'    <lineToCover lineNumber=\"{line}\" covered=\"{covered}\"/>')
              out.append('  </file>')
          out.append('</coverage>')
          open('ventigo_app/coverage/coverage.xml', 'w').write('\n'.join(out))
          print('Converted lcov.info -> coverage.xml')
          "

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ github.repository_owner }}
            -Dsonar.projectKey=drumilharsola_ventigo
            -Dsonar.sources=backend,ventigo_app/lib
            -Dsonar.tests=backend/tests,ventigo_app/test
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.coverageReportPaths=ventigo_app/coverage/coverage.xml
